number:
  - platform: template
    name: "Safe Mode Max Battery Charge Current"
    device_id: esp_board
    id: safe_mode_max_battery_charge_current
    icon: mdi:battery-charging-high
    entity_category: config
    optimistic: true
    min_value: 0
    max_value: 400
    step: 1
    initial_value: ${default_maximum_battery_charge_current}
    unit_of_measurement: "A"
    restore_value: true

  - platform: template
    name: "Safe Mode Max Sell Power"
    device_id: esp_board
    id: safe_mode_max_sell_power
    icon: mdi:transmission-tower-export
    entity_category: config
    optimistic: true
    min_value: 0
    max_value: 50000
    step: 100
    initial_value: ${default_max_sell_power}
    unit_of_measurement: "W"
    restore_value: true

select:
  - platform: template
    name: "Safe Mode System Work Mode"
    device_id: esp_board
    id: safe_mode_system_work_mode
    icon: mdi:cog
    entity_category: config
    optimistic: true
    options:
      - "Selling First"
      - "Zero Export To Load"
      - "Zero Export To CT"
    initial_option: ${default_system_work_mode}
    restore_value: true

  - platform: template
    name: "Safe Mode Solar Sell"
    device_id: esp_board
    id: safe_mode_solar_sell
    icon: mdi:toggle-switch
    entity_category: config
    optimistic: true
    options:
      - "on"
      - "off"
    initial_option: ${default_solar_sell}
    restore_value: true

  - platform: template
    name: "Safe Mode Force Off Grid"
    device_id: esp_board
    id: safe_mode_force_off_grid
    icon: mdi:transmission-tower-off
    entity_category: config
    optimistic: true
    options:
      - "on"
      - "off"
    initial_option: ${default_force_off_grid}
    restore_value: true
